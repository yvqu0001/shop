<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/list.css" />
    <script src="js/list.js" defer></script>
  </head>
  <body>
    <header>
      <a href="index.html" class="header">Shop</a>
    </header>
    <main>
      <h1 class="title"></h1>
      <section>
        <span class="flex">
          <div class="crumb_sec"></div>
          <div class="sort">
            <span>Sort by:</span>
            <button class="button small_button" data-text="az">A - Z</button>
            <button class="button small_button" data-text="za">Z - A</button>
            <button class="button small_button" data-price="up">
              Low to high
            </button>
            <button class="button small_button" data-price="down">
              High to low
            </button>
          </div>
          <div class="filters">
            <span>Filter by:</span>

            <button class="button small_button">All</button>
            <button class="button small_button">Unisex</button>
            <button class="button small_button">Women</button>
            <button class="button small_button">Men</button>
          </div>
        </span>
      </section>
      <section class="list_container"></section>
    </main>
    <footer></footer>
  </body>
</html>
